name: Craigslist Madrid – Playwright Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run nightly at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'chromium'
        type: choice
        options: [ chromium, firefox, webkit ]
      headless:
        description: 'Run headless'
        required: false
        default: 'true'
        type: choice
        options: [ 'true', 'false' ]

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xmx2048m'

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Main test job
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Run Tests (${{ matrix.browser }})
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        browser: [ chromium, firefox, webkit ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Install Maven dependencies
        run: mvn install -DskipTests --no-transfer-progress

      - name: Install Ubuntu 24.04 compatibility layer
        run: |
              sudo apt-get update
              sudo apt-get install -y libasound2t64
      - name: Install Playwright browsers
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps ${{ matrix.browser }}"

      - name: Run tests
        run: |
          mvn test \
            -Dbrowser=${{ matrix.browser }} \
            -Dheadless=true \
            --no-transfer-progress
        env:
          CI: true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: target/allure-results/
          retention-days: 30

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}
          path: target/screenshots/
          retention-days: 7

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.browser }}
          path: target/logs/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Allure report — runs after all browser jobs complete
  # ─────────────────────────────────────────────────────────────────────────────
  allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: target/allure-results

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: target/allure-results
          allure_report: target/allure-report
          allure_history: allure-history
          keep_reports: 20

      - name: Publish Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/allure-report

      - name: Upload combined Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-combined
          path: target/allure-report/
          retention-days: 30